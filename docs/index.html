<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>memome</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fcfcfc">
    <!-- SVG Icon as favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e6c134'/><path d='M30 30h40v10H30zM30 50h40v10H30zM30 70h20v10H30z' fill='white'/></svg>">
</head>
<body class="font-size-medium">
    <div id="app">
        <!-- Sidebar: Memo List -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>memome</h2>
                <button id="btn-add-memo" class="icon-btn" title="新規メモ">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            <div class="memo-list" id="memo-list">
                <!-- Memo items will be injected here -->
            </div>
            <div class="sidebar-footer">
                <button id="btn-settings" class="icon-btn text-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    設定
                </button>
            </div>
        </aside>

        <!-- Main Content: Editor -->
        <main id="editor-container" class="hidden">
            <header class="editor-header">
                <button id="btn-back" class="icon-btn mobile-only">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="header-actions">
                    <button id="btn-heading" class="icon-btn text-btn" title="見出し(H1)にする">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M4 12h16M4 5v14M20 5v14"></path></svg>
                    </button>
                    <button id="btn-font-size" class="icon-btn text-btn" title="文字サイズを変更">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M4 19V5M12 19v-7M20 19v-4M4 5l8 14M12 12l8 7"></path></svg>
                    </button>
                    <button id="btn-insert-image" class="icon-btn text-btn" title="画像挿入">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        <input type="file" id="image-input" accept="image/*" style="display: none;">
                    </button>
                    <button id="btn-export" class="icon-btn text-btn" title="エクスポート">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    <button id="btn-sync" class="icon-btn text-btn" title="同期 (GitHub Gist)">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                        <span id="sync-badge" class="badge hidden"></span>
                    </button>
                    <button id="btn-delete" class="icon-btn text-btn danger" title="削除">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            </header>
            
            <div class="editor-body">
                <!-- contenteditable for rich text / image support, but we will mostly handle it as text with image blocks -->
                <div id="memo-title" contenteditable="true" placeholder="タイトル" class="memo-title-input"></div>
                <!-- We use a custom contenteditable to allow images and formatting -->
                <div id="memo-content" contenteditable="true" class="memo-content-input" placeholder="メモを入力..."></div>
            </div>
        </main>
        
        <!-- Empty state -->
        <div id="empty-state">
            <svg viewBox="0 0 100 100" width="80" height="80"><rect width="100" height="100" rx="20" fill="#e6c134" opacity="0.2"/><path d="M30 30h40v10H30zM30 50h40v10H30zM30 70h20v10H30z" fill="#e6c134"/></svg>
            <p>メモを選択するか、<br>新しく作成してください</p>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>設定</h3>
                <button id="btn-close-settings" class="icon-btn"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="github-pat">GitHub Personal Access Token (PAT)</label>
                    <p class="setting-desc">Gistへ同期するために必要です（gist権限のみでOK）</p>
                    <input type="password" id="github-pat" placeholder="ghp_xxxxxxxxxxxxxxx">
                </div>
                <div class="setting-group">
                    <label for="github-gist-id">Gist ID (自動入力または既存ID)</label>
                    <p class="setting-desc">空欄の場合は初回同期時に新しいGistを作成します</p>
                    <input type="text" id="github-gist-id" placeholder="Gist ID">
                </div>
                <div class="setting-actions">
                    <button id="btn-save-settings" class="primary-btn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
